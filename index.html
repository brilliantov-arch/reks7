<html lang="ru">
<head>
<meta charset="UTF-8">

<title>ETHER — Internet Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;
    --accent:#ff3c5a;--accent2:#00d4ff;--accent3:#b44fff;
    --text:#e8e8f0;--dim:#6a6a80;--muted:#3a3a50;
    --green:#00ff88;--orange:#ff8c00;--yellow:#ffd700;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .layout{position:relative;z-index:1;display:grid;grid-template-rows:auto auto auto 1fr;height:100vh;}

  /* HEADER */
  header{padding:18px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;}
  .logo{font-family:'Unbounded',sans-serif;font-weight:900;font-size:24px;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hstats{display:flex;gap:20px;font-size:10px;color:var(--dim);letter-spacing:1px;}
  .hstats span{color:var(--accent2);font-weight:700;}

  /* NOW PLAYING */
  .npbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:18px;}
  .vis{display:flex;align-items:flex-end;gap:3px;height:28px;width:40px;flex-shrink:0;}
  .vb{flex:1;background:var(--accent);border-radius:2px 2px 0 0;animation:va .8s ease-in-out infinite;transform-origin:bottom;min-height:3px;}
  .vb:nth-child(2){animation-delay:.1s;background:var(--accent3);}
  .vb:nth-child(3){animation-delay:.2s;background:var(--accent2);}
  .vb:nth-child(4){animation-delay:.15s;background:var(--accent3);}
  .vb:nth-child(5){animation-delay:.05s;}
  @keyframes va{0%,100%{height:20%;}50%{height:100%;}}
  .vb.idle{animation:none;height:15%;opacity:.3;}
  .npinfo{flex:1;min-width:0;}
  .npname{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .npmeta{font-size:10px;color:var(--dim);margin-top:3px;display:flex;align-items:center;gap:8px;}
  .npg{background:var(--surface2);padding:1px 7px;border-radius:10px;font-size:9px;color:var(--accent2);border:1px solid rgba(0,212,255,.2);}
  .ctrls{display:flex;align-items:center;gap:9px;}
  .btnp{width:44px;height:44px;border-radius:50%;border:2px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .btnp:hover{background:rgba(255,60,90,.15);}
  .btnp.playing{border-color:var(--green);color:var(--green);}
  .btnp.loading{border-color:var(--yellow);color:var(--yellow);animation:spin 1.2s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .btnn{width:32px;height:32px;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:7px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .btnn:hover{border-color:var(--accent2);color:var(--accent2);}
  .volw{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--dim);}
  .vols{width:75px;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer;-webkit-appearance:none;}
  .vols::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--accent2);cursor:pointer;}
  .sdot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .sdot.live{background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite;}
  .sdot.loading{background:var(--yellow);animation:pulse .5s infinite;}
  .sdot.error{background:var(--accent);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* FILTERS */
  .filters{padding:10px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
  .frow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .flbl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;width:60px;flex-shrink:0;}
  .si{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:5px 11px;border-radius:6px;outline:none;width:190px;transition:border-color .2s;}
  .si:focus{border-color:var(--accent2);}
  .si::placeholder{color:var(--muted);}
  .chip{padding:3px 10px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .chip:hover{border-color:var(--accent2);color:var(--accent2);}
  .chip.on{border-color:var(--accent);background:rgba(255,60,90,.1);color:var(--accent);}
  .chip.ob{border-color:var(--accent2);background:rgba(0,212,255,.09);color:var(--accent2);}

  /* MAIN */
  .main{display:grid;grid-template-columns:240px 1fr;min-height:0;overflow:hidden;}
  .sb{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;padding:14px 0;}
  .sb::-webkit-scrollbar{width:3px;}
  .sb::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .sbs{margin-bottom:18px;}
  .sbt{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:0 16px 5px;}
  .sbi{padding:6px 16px;font-size:11px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s;border-left:2px solid transparent;}
  .sbi:hover{color:var(--text);background:var(--surface2);}
  .sbi.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,60,90,.05);}
  .sbc{font-size:9px;color:var(--muted);background:var(--surface2);padding:1px 6px;border-radius:8px;min-width:20px;text-align:center;}
  .sbi.active .sbc{background:rgba(255,60,90,.18);color:var(--accent);}

  /* GRID */
  .gp{overflow-y:auto;padding:16px 20px;}
  .gp::-webkit-scrollbar{width:3px;}
  .gp::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .pt{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;}
  .pc{font-size:10px;color:var(--dim);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:9px;}
  .sc{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;cursor:pointer;transition:all .2s;position:relative;}
  .sc:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 7px 18px rgba(0,0,0,.3);}
  .sc.act{border-color:var(--accent);background:rgba(255,60,90,.07);box-shadow:0 0 16px rgba(255,60,90,.12);}
  .stop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
  .sico{width:38px;height:38px;border-radius:7px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);}
  .sq{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:700;}
  .qh{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.22);}
  .qm{background:rgba(255,140,0,.1);color:var(--orange);border:1px solid rgba(255,140,0,.22);}
  .ql{background:rgba(255,60,90,.1);color:var(--accent);border:1px solid rgba(255,60,90,.22);}
  .sn{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;line-height:1.3;margin-bottom:3px;}
  .sg{font-size:9px;color:var(--dim);margin-bottom:7px;}
  .sft{display:flex;align-items:center;justify-content:space-between;}
  .scnt{font-size:9px;color:var(--dim);}
  .sst{display:flex;align-items:center;gap:3px;font-size:8px;}
  .sd{width:5px;height:5px;border-radius:50%;}
  .st-live{color:var(--green);} .st-live .sd{background:var(--green);box-shadow:0 0 4px var(--green);}
  .st-unk{color:var(--muted);} .st-unk .sd{background:var(--muted);}
  .nr{grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);font-size:11px;}
  .nri{font-size:36px;margin-bottom:8px;}

  audio{display:none;}
  @media(max-width:768px){.main{grid-template-columns:1fr;}.sb{display:none;}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}header,.npbar,.filters{padding-left:14px;padding-right:14px;}}
</style>
</head>

  {id:183,n:'Slam! Dance',        co:'NL',fl:'🇳🇱',g:'Dance',        e:'2010s',t:'electronic',br:128,url:'https://22173.live.streamtheworld.com/SLAM.mp3',i:'💥'},

  {id:187,n:'NRK P3',             co:'NO',fl:'🇳🇴',g:'Pop/Electronic',e:'2010s',t:'electronic',br:128,url:'https://lyd.nrk.no/nrk_radio_p3_mp3_h',i:'🎵'},

  // FINLAND
  {id:192,n:'Yle X3M Finland',    co:'FI',fl:'🇫🇮',g:'Pop/Alt',      e:'2000s',t:'mainstream',br:128,url:'https://icecast.yle.fi/radio/ylex/icecast.mp3',i:'🦌'},

  // SWEDEN
  {id:194,n:'SR P2 (Classical)',   co:'SE',fl:'🇸🇪',g:'Classical',    e:'classics',t:'classical',br:128,url:'https://sverigesradio.se/topsy/direkt/2562-hi.mp3',i:'🎻'},
  {id:195,n:'SR P3',              co:'SE',fl:'🇸🇪',g:'Pop/Alt',      e:'2000s',t:'mainstream',br:128,url:'https://sverigesradio.se/topsy/direkt/164-hi.mp3',i:'🎵'},

  // UKRAINE
  {id:197,n:'Kiss FM Ukraine',    co:'UA',fl:'🇺🇦',g:'Pop/Dance',    e:'2010s',t:'electronic',br:128,url:'https://air.kissfm.com.ua/kissfm_ukr_128',i:'💋'},
  {id:198,n:'Радіо НВ',           co:'UA',fl:'🇺🇦',g:'Talk/News',    e:'2010s',t:'talk',     br:128,url:'https://nv.radiostream.ua/nv_128.mp3',i:'📻'},

  // SPAIN
  {id:200,n:'Ibiza Global Radio', co:'ES',fl:'🇪🇸',g:'Electronic',   e:'2000s',t:'electronic',br:128,url:'https://lacasetaibizaglobal.out.airtime.pro/ibizaglobal_a',i:'🏖️'},
  {id:201,n:'Cadena 100',         co:'ES',fl:'🇪🇸',g:'Pop',          e:'2000s',t:'mainstream',br:128,url:'https://25193.live.streamtheworld.com/CADENA_100_SC',i:'💯'},
  {id:202,n:'Los 40',             co:'ES',fl:'🇪🇸',g:'Pop/Dance',    e:'2010s',t:'mainstream',br:128,url:'https://25193.live.streamtheworld.com/LOS40_SC',i:'4️⃣0️⃣'},
  {id:203,n:'Café del Mar',       co:'ES',fl:'🇪🇸',g:'Chillout',     e:'2000s',t:'ambient',  br:128,url:'https://streams.cafedelmar.com/cafedelmar-128.mp3',i:'☕'},

  // TRANCE
  {id:205,n:'TrancePulse.net',    co:'IE',fl:'🇮🇪',g:'Trance',       e:'2000s',t:'electronic',br:128,url:'https://listen.trancepulse.net/mp3',i:'🔮'},
];

// ============================================================
// STATE
// ============================================================
let cur=null, curIdx=0, filtered=[...S], sbF='all', gF='all', eF='all', srch='', favs=new Set();
const ap=document.getElementById('ap');
ap.volume=0.8;

// ============================================================
// INIT
// ============================================================
function qc(br){return br>=192?'h':br>=128?'m':'l';}

function buildSb(){
  const cnts={},fls={};
  S.forEach(s=>{cnts[s.co]=(cnts[s.co]||0)+1;fls[s.co]=s.fl;});
  document.getElementById('sbc').innerHTML=Object.entries(cnts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>
    `<div class="sbi" data-f="country:${c}" onclick="setSbF(this)"><span>${fls[c]} ${c}</span><span class="sbc">${n}</span></div>`).join('');
  const tms=[['mainstream','🏆 Мейнстрим'],['electronic','⚡ Электронная'],['rock','🎸 Рок'],['indie','🦋 Инди'],['jazz','🎷 Джаз'],['classical','🎻 Классика'],['hiphop','🎤 Хип-Хоп'],['ambient','🌌 Эмбиент'],['lounge','🍸 Лаундж'],['retro','📼 Ретро'],['russian','🇷🇺 Русское'],['world','🌍 Мировое'],['reggae','🌴 Регги'],['blues','🎺 Блюз'],['talk','🎙️ Разговор'],['country','🤠 Кантри'],['latin','💃 Латин']];
  const tc={};S.forEach(s=>tc[s.t]=(tc[s.t]||0)+1);
  document.getElementById('sbt').innerHTML=tms.filter(([k])=>tc[k]).map(([k,l])=>
    `<div class="sbi" data-f="theme:${k}" onclick="setSbF(this)"><span>${l}</span><span class="sbc">${tc[k]}</span></div>`).join('');
}

function buildChips(){
  const er=['60s','70s','80s','90s','2000s','2010s','classics'];
  const el={'60s':'60-е','70s':'70-е','80s':'80-е','90s':'90-е','2000s':'2000-е','2010s':'2010-е','classics':'Классика'};
  const ec={};S.forEach(s=>ec[s.e]=(ec[s.e]||0)+1);
  document.getElementById('gc').innerHTML=`<button class="chip ob" data-g="all" onclick="setG(this,'all')">Все жанры</button>`+
    ['Pop','Rock','Electronic','Jazz','Classical','Hip-Hop','Ambient','Lounge','Blues','Reggae'].map(g=>`<button class="chip" data-g="${g}" onclick="setG(this,'${g}')">${g}</button>`).join('');
  document.getElementById('ec').innerHTML=`<button class="chip ob" data-e="all" onclick="setE(this,'all')">Все эпохи</button>`+
    er.filter(e=>ec[e]).map(e=>`<button class="chip" data-e="${e}" onclick="setE(this,'${e}')">${el[e]} (${ec[e]})</button>`).join('');
}

// ============================================================
// FILTERS
// ============================================================
function applyF(){
  let l=[...S];
  if(sbF==='fav') l=l.filter(s=>favs.has(s.id));
  else if(sbF.startsWith('country:')) l=l.filter(s=>s.co===sbF.split(':')[1]);
  else if(sbF.startsWith('theme:')) l=l.filter(s=>s.t===sbF.split(':')[1]);
  if(gF!=='all') l=l.filter(s=>s.g.toLowerCase().includes(gF.toLowerCase()));
  if(eF!=='all') l=l.filter(s=>s.e===eF);
  if(srch){const q=srch.toLowerCase();l=l.filter(s=>s.n.toLowerCase().includes(q)||s.g.toLowerCase().includes(q)||s.co.toLowerCase().includes(q));}
  filtered=l;
  renderGrid();
}

function setSbF(el){
  sbF=el.dataset.f;
  document.querySelectorAll('.sbi').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  const t=sbF.startsWith('country:')?'🌍 '+sbF.split(':')[1]:sbF.startsWith('theme:')?sbF.split(':')[1]:sbF==='fav'?'⭐ Избранное':'Все станции';
  document.getElementById('pTitle').textContent=t;
  applyF();
}

function setG(el,v){gF=v;document.querySelectorAll('#gc .chip').forEach(c=>c.className='chip');el.className='chip ob';applyF();}
function setE(el,v){eF=v;document.querySelectorAll('#ec .chip').forEach(c=>c.className='chip');el.className='chip ob';applyF();}
document.getElementById('sq').addEventListener('input',e=>{srch=e.target.value;applyF();});

// ============================================================
// RENDER
// ============================================================
function renderGrid(){
  const g=document.getElementById('grid');
  document.getElementById('pCnt').textContent=`${filtered.length} из ${S.length}`;
  document.getElementById('ca').textContent=S.length;
  document.getElementById('cf').textContent=favs.size;
  if(!filtered.length){g.innerHTML=`<div class="nr"><div class="nri">📡</div>Станции не найдены</div>`;return;}
  g.innerHTML=filtered.map(s=>{
    const act=cur&&cur.id===s.id;
    const qq=qc(s.br);
    return `<div class="sc${act?' act':''}" onclick="play(${s.id})" id="c${s.id}">
      <div class="stop"><div class="sico">${s.i}</div><span class="sq q${qq}">${s.br}k</span></div>
      <div class="sn">${s.n}</div>
      <div class="sg">${s.g}</div>
      <div class="sft">
        <span class="scnt">${s.fl} ${s.co}</span>
        <span class="sst ${act?'st-live':'st-unk'}"><span class="sd"></span>${act?'LIVE':'—'}</span>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// PLAYER
// ============================================================
function play(id){
  const s=S.find(x=>x.id===id);
  if(!s)return;
  if(cur?.id===id&&!ap.paused){stop();return;}
  cur=s;
  curIdx=filtered.findIndex(x=>x.id===id);
  ap.src=s.url;
  ap.load();
  ap.play().catch(()=>{});
  updNP(s);
  setLoading();
  renderGrid();
}

function stop(){
  ap.pause();ap.src='';
  document.getElementById('bPlay').textContent='▶';
  document.getElementById('bPlay').className='btnp';
  document.getElementById('dot').className='sdot';
  setIdle(true);renderGrid();
}

function updNP(s){
  document.getElementById('npN').textContent=s.n;
  document.getElementById('npF').textContent=s.fl;
  document.getElementById('npG').textContent=s.g;
  document.getElementById('npB').textContent=s.br+'kbps';
}

function setLoading(){
  document.getElementById('bPlay').textContent='◌';
  document.getElementById('bPlay').className='btnp loading';
  document.getElementById('dot').className='sdot loading';
}

function setPlaying(){
  document.getElementById('bPlay').textContent='⏸';
  document.getElementById('bPlay').className='btnp playing';
  document.getElementById('dot').className='sdot live';
  setIdle(false);
}

function setIdle(v){document.querySelectorAll('.vb').forEach(b=>b.classList.toggle('idle',v));}

ap.addEventListener('playing',()=>{setPlaying();renderGrid();});
ap.addEventListener('waiting',()=>setLoading());
ap.addEventListener('error',()=>{
  document.getElementById('bPlay').textContent='▶';
  document.getElementById('bPlay').className='btnp';
  document.getElementById('dot').className='sdot error';
  setIdle(true);
});

document.getElementById('bPlay').addEventListener('click',()=>{
  if(!cur)return;
  if(!ap.paused){ap.pause();document.getElementById('bPlay').textContent='▶';document.getElementById('bPlay').className='btnp';setIdle(true);}
  else{ap.play().catch(()=>{});setLoading();}
});

document.getElementById('bNext').addEventListener('click',()=>{
  if(!filtered.length)return;
  curIdx=(curIdx+1)%filtered.length;play(filtered[curIdx].id);
});
document.getElementById('bPrev').addEventListener('click',()=>{
  if(!filtered.length)return;
  curIdx=(curIdx-1+filtered.length)%filtered.length;play(filtered[curIdx].id);
});
document.getElementById('vol').addEventListener('input',e=>{ap.volume=parseFloat(e.target.value);});

// ============================================================
document.getElementById('hT').textContent=S.length;
document.getElementById('hC').textContent=new Set(S.map(s=>s.co)).size;
buildSb();buildChips();applyF();
</script>
</body>
</html>
